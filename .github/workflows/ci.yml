name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Lint code
        run: ./scripts/lint

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Run tests
        run: ./scripts/test

  test-openapi-directory:
    name: OpenAPI Directory Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache submodules
        id: cache-submodules
        uses: actions/cache@v4
        with:
          path: test-fixtures/openapi-directory
          key: submodules-${{ hashFiles('.gitmodules') }}

      - name: Checkout submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Run OpenAPI directory tests
        run: deno task test:specs

  test-npm-build:
    name: Test npm Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build npm packages (linux-x64 only)
        run: deno run -A scripts/build_npm.ts --platform linux-x64

      - name: Install and test CLI
        run: |
          cd /tmp
          npm init -y
          npm install ${{ github.workspace }}/npm/cli ${{ github.workspace }}/npm/cli-linux-x64
          npx steady validate ${{ github.workspace }}/tests/specs/simple.yaml
          npx steady --help

      - name: Package tests
        run: ./tests/process-cleanup.sh

  test-sdks:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    concurrency:
      group: sdk-tests
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install rye
        uses: eifinger/setup-rye@v4
        with:
          enable-cache: true

      - name: Run SDK tests
        continue-on-error: true
        run: ./scripts/test-sdks --output sdk-results.json

      - name: Upload SDK test results
        uses: actions/upload-artifact@v4
        with:
          name: sdk-test-results
          path: sdk-results.json
          retention-days: 90

      - name: Download baseline results (main branch)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: sdk-test-results
          path: baseline/

      - name: Compare results and comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Load current results
            let current;
            try {
              current = JSON.parse(fs.readFileSync('sdk-results.json', 'utf8'));
            } catch (e) {
              console.log('No current results found');
              return;
            }

            // Load baseline results (may not exist)
            let baseline = null;
            try {
              baseline = JSON.parse(fs.readFileSync('baseline/sdk-results.json', 'utf8'));
            } catch (e) {
              console.log('No baseline results found (first run or main branch)');
            }

            const baselineMap = new Map();
            if (baseline) {
              for (const r of baseline.results) {
                baselineMap.set(r.name, r);
              }
            }

            // Classify each SDK
            const regressions = [];
            const improvements = [];
            const newSdks = [];
            const rows = [];

            for (const result of current.results) {
              const base = baselineMap.get(result.name);
              let delta = '';

              if (!base) {
                newSdks.push(result);
                delta = 'NEW';
              } else if (base.passed && !result.passed) {
                regressions.push({ name: result.name, error: result.error });
                delta = 'REGRESSION';
              } else if (!base.passed && result.passed) {
                improvements.push(result.name);
                delta = 'FIXED';
              }

              rows.push({
                name: result.name,
                main: base ? (base.passed ? 'PASS' : 'FAIL') : '-',
                pr: result.passed ? 'PASS' : 'FAIL',
                delta,
              });
            }

            // Check for SDKs removed from the list
            const removedSdks = [];
            if (baseline) {
              const currentNames = new Set(current.results.map(r => r.name));
              for (const r of baseline.results) {
                if (!currentNames.has(r.name)) {
                  removedSdks.push(r.name);
                }
              }
            }

            // Build comment
            let body = `## SDK Integration Test Results\n\n`;
            body += `**${current.summary.passed}/${current.summary.total} passing**`;
            if (baseline) {
              const diff = current.summary.passed - baseline.summary.passed;
              if (diff !== 0) {
                body += ` (${diff > 0 ? '+' : ''}${diff} vs main)`;
              }
            }
            body += `\n\n`;

            // Show changes first (most important for review)
            const hasChanges = regressions.length > 0 || improvements.length > 0 || newSdks.length > 0 || removedSdks.length > 0;

            if (!hasChanges && baseline) {
              body += `No changes vs main.\n\n`;
            }

            if (regressions.length > 0) {
              body += `### Regressions\n\n`;
              for (const r of regressions) {
                body += `- **${r.name}**${r.error ? `: ${r.error}` : ''}\n`;
              }
              body += `\n`;
            }

            if (improvements.length > 0) {
              body += `### Fixed\n\n`;
              for (const name of improvements) {
                body += `- **${name}**\n`;
              }
              body += `\n`;
            }

            if (newSdks.length > 0) {
              body += `### New\n\n`;
              for (const r of newSdks) {
                body += `- **${r.name}**: ${r.passed ? 'PASS' : 'FAIL'}\n`;
              }
              body += `\n`;
            }

            if (removedSdks.length > 0) {
              body += `### Removed\n\n`;
              for (const name of removedSdks) {
                body += `- **${name}**\n`;
              }
              body += `\n`;
            }

            // Full comparison table
            body += `<details><summary>Full results</summary>\n\n`;
            body += `| SDK | main | PR | |\n|-----|------|----|-|\n`;
            for (const r of rows) {
              const icon = r.delta === 'REGRESSION' ? '🔴'
                : r.delta === 'FIXED' ? '🟢'
                : r.delta === 'NEW' ? '🆕'
                : '';
              body += `| ${r.name} | ${r.main} | ${r.pr} | ${icon} |\n`;
            }
            body += `\n</details>\n`;

            // Post or update comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## SDK Integration Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // Fail only on regressions
            if (regressions.length > 0) {
              core.setFailed(`${regressions.length} SDK regression(s) detected`);
            }
