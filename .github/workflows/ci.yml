name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.11"
          cache: true

      - name: Lint code
        run: ./scripts/lint

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.11"
          cache: true

      - name: Run tests
        run: ./scripts/test

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.11"
          cache: true

      - name: Run fuzz tests
        env:
          STEADY_FUZZ: "1"
        run: ./scripts/test tests/integration/fuzz.test.ts

  test-npm-build:
    name: Test npm Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.11"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build npm packages (linux-x64 only)
        run: deno run -A scripts/build_npm.ts --platform linux-x64

      - name: Install and test CLI
        run: |
          cd /tmp
          npm init -y
          npm install ${{ github.workspace }}/npm/cli ${{ github.workspace }}/npm/cli-linux-x64
          npx steady validate ${{ github.workspace }}/tests/specs/simple.yaml
          npx steady --help

      - name: Package tests
        run: ./tests/process-cleanup.sh
