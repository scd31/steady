name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Lint code
        run: ./scripts/lint

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Run tests
        run: ./scripts/test

  test-openapi-directory:
    name: OpenAPI Directory Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache submodules
        id: cache-submodules
        uses: actions/cache@v4
        with:
          path: test-fixtures/openapi-directory
          key: submodules-${{ hashFiles('.gitmodules') }}

      - name: Checkout submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Run OpenAPI directory tests
        run: deno task test:specs

  test-npm-build:
    name: Test npm Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build npm packages (linux-x64 only)
        run: deno run -A scripts/build_npm.ts --platform linux-x64

      - name: Install and test CLI
        run: |
          cd /tmp
          npm init -y
          npm install ${{ github.workspace }}/npm/cli ${{ github.workspace }}/npm/cli-linux-x64
          npx steady validate ${{ github.workspace }}/tests/specs/simple.yaml
          npx steady --help

      - name: Package tests
        run: ./tests/process-cleanup.sh

  test-sdks:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install rye
        uses: eifinger/setup-rye@v4
        with:
          enable-cache: true

      - name: Run SDK tests
        id: sdk-tests
        continue-on-error: true
        run: |
          ./scripts/test-sdks --output sdk-results.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload SDK test results
        uses: actions/upload-artifact@v4
        with:
          name: sdk-test-results
          path: sdk-results.json
          retention-days: 90

      - name: Download baseline results (main branch)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: sdk-test-results
          path: baseline/

      - name: Compare results and comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Load current results
            let current;
            try {
              current = JSON.parse(fs.readFileSync('sdk-results.json', 'utf8'));
            } catch (e) {
              console.log('No current results found');
              return;
            }

            // Load baseline results (may not exist)
            let baseline = null;
            try {
              baseline = JSON.parse(fs.readFileSync('baseline/sdk-results.json', 'utf8'));
            } catch (e) {
              console.log('No baseline results found (first run or main branch)');
            }

            // Build comparison
            const regressions = [];
            const improvements = [];
            const newTests = [];

            for (const result of current.results) {
              const baselineResult = baseline?.results?.find(r => r.name === result.name);

              if (!baselineResult) {
                newTests.push(result);
              } else if (baselineResult.passed && !result.passed) {
                regressions.push({ name: result.name, error: result.error });
              } else if (!baselineResult.passed && result.passed) {
                improvements.push(result.name);
              }
            }

            // Build comment body
            let body = `## SDK Integration Test Results\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Total SDKs | ${current.summary.total} |\n`;
            body += `| Passed | ${current.summary.passed} |\n`;
            body += `| Failed | ${current.summary.failed} |\n`;

            if (baseline) {
              const passedDiff = current.summary.passed - baseline.summary.passed;
              const diffStr = passedDiff > 0 ? `+${passedDiff}` : passedDiff.toString();
              body += `| vs main | ${diffStr} |\n`;
            }

            body += `\n`;

            if (regressions.length > 0) {
              body += `### Regressions (${regressions.length})\n\n`;
              body += `These SDKs were passing on main but are now failing:\n\n`;
              for (const r of regressions) {
                body += `- **${r.name}**${r.error ? `: ${r.error}` : ''}\n`;
              }
              body += `\n`;
            }

            if (improvements.length > 0) {
              body += `### Improvements (${improvements.length})\n\n`;
              body += `These SDKs were failing on main but are now passing:\n\n`;
              for (const name of improvements) {
                body += `- **${name}**\n`;
              }
              body += `\n`;
            }

            if (newTests.length > 0) {
              body += `### New SDKs (${newTests.length})\n\n`;
              for (const r of newTests) {
                body += `- **${r.name}**: ${r.passed ? 'PASS' : 'FAIL'}\n`;
              }
              body += `\n`;
            }

            body += `\n<details><summary>Full Results</summary>\n\n`;
            body += `| SDK | Status |\n|-----|--------|\n`;
            for (const r of current.results) {
              body += `| ${r.name} | ${r.passed ? 'PASS' : 'FAIL'} |\n`;
            }
            body += `\n</details>\n`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## SDK Integration Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // Fail if there are regressions
            if (regressions.length > 0) {
              core.setFailed(`${regressions.length} SDK regression(s) detected`);
            }

      - name: Check SDK test exit code
        if: steps.sdk-tests.outputs.exit_code != '0' && github.event_name != 'pull_request'
        run: exit 1
