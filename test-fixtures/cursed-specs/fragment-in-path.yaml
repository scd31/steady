# CURSED SPEC: URI Fragments in Path Templates
#
# Violation: OpenAPI path templates must not contain unescaped generic syntax
#   characters (RFC 3986 Section 3), which includes `#`. The fragment portion
#   of a URI is client-side only and never sent to the server.
#
# Real-world occurrence: Yes - widespread in AWS OpenAPI specs generated by
#   aws2openapi. Also seen in Box.com specs. Used as a disambiguation hack
#   for RPC-style APIs where multiple operations share the same HTTP path.
#
# Why it's cursed:
#   - HTTP clients strip fragments before sending requests (RFC 3986)
#   - The server never sees the `#...` portion, so it cannot route on it
#   - Multiple operations collapse to the same path (e.g., all become `POST /`)
#   - Each operation has different request/response schemas, but the server
#     cannot distinguish them without header/query-based dispatch
#
# What happens:
#   - AWS JSON-RPC services: actual dispatch is via `X-Amz-Target` header
#   - AWS query protocol: actual dispatch is via `Action` query parameter
#   - Box.com: dispatch is via the path before the `#`
#   - Mock servers, fuzzers, and validators cannot test these paths
#
# How Steady handles it:
#   - E1021 warning at startup for each path containing `#`
#   - Skips fragment paths during validation and fuzz testing
#   - Operations on fragment paths are not routable over HTTP

openapi: 3.1.0
info:
  title: Cursed API - URI Fragments in Paths
  version: 1.0.0
  description: |
    Paths with URI fragment identifiers. Common in AWS specs converted by
    aws2openapi, where RPC operations are disambiguated via fragments
    that HTTP clients strip before sending.

paths:
  # Pattern 1: AWS JSON-RPC style (X-Amz-Target header)
  # All operations are POST / distinguished by header, not path.
  /#X-Amz-Target=MyService.CreateThing:
    post:
      operationId: createThing
      summary: Create a thing (JSON-RPC dispatch via X-Amz-Target header)
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [MyService.CreateThing]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [ThingName]
              properties:
                ThingName:
                  type: string
      responses:
        "200":
          description: Thing created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ThingId:
                    type: string

  /#X-Amz-Target=MyService.DeleteThing:
    post:
      operationId: deleteThing
      summary: Delete a thing (same base path, different fragment)
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [MyService.DeleteThing]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [ThingId]
              properties:
                ThingId:
                  type: string
      responses:
        "200":
          description: Thing deleted

  # Pattern 2: AWS Query protocol style (Action query parameter)
  /#Action=SendMessage:
    post:
      operationId: sendMessage
      summary: Send a message (Query protocol dispatch via Action param)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [QueueUrl, MessageBody]
              properties:
                QueueUrl:
                  type: string
                MessageBody:
                  type: string
      responses:
        "200":
          description: Message sent

  # Pattern 3: Box.com style (path + fragment for sub-operation)
  /oauth2/token#refresh:
    post:
      operationId: refreshToken
      summary: Refresh an OAuth2 token (fragment distinguishes grant type)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, refresh_token]
              properties:
                grant_type:
                  type: string
                  enum: [refresh_token]
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed

  # A normal path for comparison
  /health:
    get:
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              example:
                status: ok
