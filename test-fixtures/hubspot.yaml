  /crm/v3/lists/:
    get:
      description: >-
        Fetch multiple lists in a single request by **ILS list ID**. The response will include the definitions
        of all lists that exist for the `listIds` provided.
      operationId: get-/crm/v3/lists/_getAll
      parameters:
        - description: >-
            A flag indicating whether or not the response object list definitions should include a filter
            branch definition. By default, object list definitions will not have their filter branch
            definitions included in the response.
          explode: true
          in: query
          name: includeFilters
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: The **ILS IDs** of the lists to fetch.
          explode: true
          in: query
          name: listIds
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
      responses:
        "200":
          content:
            application/json:
              example:
                lists:
                  - createdAt: "2023-11-06T20:44:49.324Z"
                    createdById: "123"
                    filterBranch:
                      filterBranchOperator: OR
                      filterBranchType: OR
                      filterBranches:
                        - filterBranchOperator: AND
                          filterBranchType: AND
                          filters:
                            - filterType: PROPERTY
                              operation:
                                includeObjectsWithNoValueSet: false
                                operationType: MULTISTRING
                                operator: CONTAINS
                                values:
                                  - j
                              property: firstname
                    filtersUpdatedAt: "2023-11-15T20:24:22.020Z"
                    listId: "1"
                    listVersion: 2
                    name: Example List 1
                    objectTypeId: 0-1
                    processingStatus: COMPLETE
                    processingType: DYNAMIC
                    size: 330
                    updatedAt: "2023-11-15T20:24:36.761Z"
                    updatedById: "123"
                  - createdAt: "2023-06-13T14:54:21.852Z"
                    createdById: "123"
                    filterBranch:
                      filterBranchOperator: OR
