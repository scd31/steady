    get:
      description: >
        Get the list of blog authors. Supports paging and filtering. This method would be useful for an
        integration that examined these models and used an external service to suggest edits.
      operationId: get-/cms/v3/blogs/authors_getPage
      parameters:
        - description: >-
            The cursor token value to get the next set of results. You can get this from the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: Specifies whether to return deleted Blog Authors. Defaults to `false`.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            type: boolean
          style: form
        - description: Only return Blog Authors created after the specified time.
          explode: true
          in: query
          name: createdAfter
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Only return Blog Authors created at exactly the specified time.
          explode: true
          in: query
          name: createdAt
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Only return Blog Authors created before the specified time.
          explode: true
          in: query
          name: createdBefore
          required: false
          schema:
            format: date-time
            type: string
