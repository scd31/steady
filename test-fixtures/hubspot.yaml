        displayOrder: 0
        id: "812723471"
        label: My ticket pipeline
        stages:
          - archived: false
            createdAt: "2019-10-30T03:30:17.883Z"
            displayOrder: 0
            id: "1234912"
            label: In Progress
            metadata:
              ticketState: OPEN
            updatedAt: "2019-12-07T16:50:06.678Z"
          - archived: false
            createdAt: "2019-10-30T03:30:17.883Z"
            displayOrder: 0
            id: "1234914"
            label: Done
            metadata:
              ticketState: CLOSED
            updatedAt: "2019-12-07T16:50:06.678Z"
        updatedAt: "2019-12-07T16:50:06.678Z"
      properties:
        archived:
          description: Whether the pipeline is archived.
          type: boolean
        archivedAt:
          description: The date the pipeline was archived. `archivedAt` will only be present if the pipeline is archived.
          format: date-time
          type: string
        createdAt:
          description: The date the pipeline was created. The default pipelines will have createdAt = 0.
          format: date-time
          type: string
        displayOrder:
          description: >-
            The order for displaying this pipeline. If two pipelines have a matching `displayOrder`, they will
            be sorted alphabetically by label.
          format: int32
          type: integer
        id:
          description: A unique identifier generated by HubSpot that can be used to retrieve and update the pipeline.
          type: string
        label:
          description: A unique label used to organize pipelines in HubSpot's UI
          type: string
        stages:
          description: >-
            The stages associated with the pipeline. They can be retrieved and updated via the pipeline stages
            endpoints.
