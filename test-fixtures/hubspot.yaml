  /cms/v3/site-search/search:
    get:
      description: >-
        Returns any website content matching the given search criteria for a given HubSpot account. Searches
        can be filtered by content type, domain, or URL path.
      operationId: get-/cms/v3/site-search/search_search
      parameters:
        - description: Specifies whether or not you are showing autocomplete results. Defaults to false.
          explode: true
          in: query
          name: autocomplete
          required: false
          schema:
            type: boolean
          style: form
        - description: >-
            Specifies the maximum amount a result will be boosted based on its view count. Defaults to 5.0.
            Read more about elasticsearch boosting
            [here](https://www.elastic.co/guide/en/elasticsearch/reference/current/mapping-boost.html).
          explode: true
          in: query
          name: boostLimit
          required: false
          schema:
            type: number
          style: form
        - description: >-
            Specifies a relative time window where scores of documents published outside this time window
            decay. This can only be used for blog posts. For example, boostRecent=10d will boost documents
            published within the last 10 days. Supported timeunits are ms (milliseconds), s (seconds), m
            (minutes), h (hours), d (days).
          explode: true
          in: query
          name: boostRecent
          required: false
          schema:
            type: string
          style: form
        - description: A domain to match search results for. Multiple domains can be provided with &.
          explode: true
          in: query
          name: domain
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: >-
            Specifies which blog(s) to be searched by blog ID. Can be used multiple times to search more than
            one blog.
          explode: true
          in: query
          name: groupId
          required: false
          schema:
            items:
              format: int64
              type: integer
            type: array
          style: form
        - description: Specify a HubDB query to further filter the search results.
          explode: true
          in: query
          name: hubdbQuery
          required: false
          schema:
            type: string
          style: form
        - description: >-
            Specifies the language of content to be searched. This value must be a valid [ISO 639-1 language
            code](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) (e.g. `es` for Spanish)
          explode: true
          in: query
          name: language
          required: false
