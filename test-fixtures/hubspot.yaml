          plainTextVersion: >-
            This is custom! View in browser ({{view_as_page_url}})


            Hello {{ contact.firstname }},


            Plain text emails have minimal formatting so your reader can really focus on what you have to say.
            Introduce yourself and explain why you’re reaching out.


            Every email should try to lead the reader to some kind of action. Use this space to describe why
            the reader should want to click on the link below. Put the link on its own line to really draw
            their eye to it.


            Link text


            Now it’s time to wrap up your email. Before your signature, thank the recipient for reading. You
            can also invite them to send this email to any of their colleagues who might be interested.


            All the best,


            Your full name


            Your job title


            Other contact information


            {{site_settings.company_name}}, {{site_settings.company_street_address_1}},
            {{site_settings.company_street_address_2}}, {{site_settings.company_city}},
            {{site_settings.company_state}} {{site_settings.company_zip}}, {{site_settings.company_country}},
            {{site_settings.company_phone}}


            Unsubscribe ({{unsubscribe_link_all}})


            Manage preferences ({{unsubscribe_link}})
