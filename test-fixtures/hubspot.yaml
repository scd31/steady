      tags:
        - List_App
  /crm/v3/lists/{listId}/update-list-filters:
    put:
      description: >-
        Update the filter branch definition of a `DYNAMIC` list. Once updated, the list memberships will be
        re-evaluated and updated to match the new definition.
      operationId: put-/crm/v3/lists/{listId}/update-list-filters_updateListFilters
      parameters:
        - description: >-
            A flag indicating whether or not the memberships added to the list as a result of the filter
            change should be enrolled in workflows that are relevant to this list.
          explode: true
          in: query
          name: enrollObjectsInWorkflows
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: The **ILS ID** of the list to update.
          explode: false
          in: path
          name: listId
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmListsListFilterUpdateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                updatedList:
                  createdAt: "2023-11-15T20:11:50.293Z"
                  createdById: "123"
                  filterBranch:
                    filterBranchOperator: OR
                    filterBranchType: OR
                    filterBranches:
                      - filterBranchOperator: AND
                        filterBranchType: AND
                        filters:
                          - filterType: PROPERTY
                            operation:
                              includeObjectsWithNoValueSet: false
                              operationType: NUMBER
                              operator: IS_GREATER_THAN_OR_EQUAL_TO
                              value: 12
                            property: hs_predictivecontactscore_v2
                          - filterType: PROPERTY
                            operation:
                              includeObjectsWithNoValueSet: false
                              operationType: ALL_PROPERTY
                              operator: IS_UNKNOWN
                            property: engagements_last_meeting_booked_source
                          - acceptedStatuses:
                              - OPT_IN
                            filterType: EMAIL_SUBSCRIPTION
                            subscriptionIds:
                              - "321981152"
                              - "81537745"
                            subscriptionType: SUBSCRIPTION
                  filtersUpdatedAt: "2023-11-15T23:50:12.690Z"
                  listId: "1"
                  listVersion: 2
                  name: Zero Size Test
                  objectTypeId: 0-1
                  processingStatus: PROCESSING
                  processingType: DYNAMIC
                  updatedAt: "2023-11-15T23:50:12.771Z"
                  updatedById: "123"
              schema:
                $ref: "#/components/schemas/CrmListsListUpdateResponse"
          description: Successful response
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - cms.membership.access_groups.write
            - crm.lists.read
        - private_apps:
            - crm.lists.read
            - crm.lists.write
      summary: Update List Filter Definition
      tags:
        - Lists
  /crm/v3/lists/{listId}/update-list-name:
    put:
      description: >-
        Update the name of a list. The name must be globally unique relative to all other public lists in the
        portal.
      operationId: put-/crm/v3/lists/{listId}/update-list-name_updateName
      parameters:
        - description: >-
            A flag indicating whether or not the response object list definition should include a filter
            branch definition. By default, object list definitions will not have their filter branch
            definitions included in the response.
