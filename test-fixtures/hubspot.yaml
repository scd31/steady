        example, by adding the query parameters `column1__gt=5&sort=-column1`, API returns the rows with
        values for column `column1` greater than 5 and in the descending order of `column1` values. Refer to
        the [overview
        section](https://developers.hubspot.com/docs/api/cms/hubdb#filtering-and-sorting-table-rows) for
        detailed filtering and sorting options.

