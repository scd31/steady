                  <p style="margin-bottom:10px;">Hello {{ contact.firstname }},<br><br>Plain text emails have
                  minimal formatting so your reader can really focus on what you have to say. Introduce
                  yourself and explain why you’re reaching out.</p><p style="margin-bottom:10px;">Every email
                  should try to lead the reader to some kind of action. Use this space to describe why the
                  reader should want to click on the link below. Put the link on its own line to really draw
                  their eye to it.</p><p style="margin-bottom:10px;"><a target="_blank" rel="noopener">Link
                  text</a></p><p style="margin-bottom:10px;">Now it’s time to wrap up your email. Before your
                  signature, thank the recipient for reading. You can also invite them to send this email to
                  any of their colleagues who might be interested.</p><p style="margin-bottom:10px;">All the
                  best,<br>Your full name<br>Your job title<br>Other contact information</p>
