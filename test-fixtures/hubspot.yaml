    CrmPipelinesPipelineStage:
      description: A pipeline stage definition.
      example:
        archived: false
        createdAt: "2019-10-30T03:30:17.883Z"
        displayOrder: 0
        id: "1234912"
        label: In Progress
        metadata:
          ticketState: OPEN
        updatedAt: "2019-12-07T16:50:06.678Z"
      properties:
        archived:
          description: Whether the pipeline is archived.
          type: boolean
        archivedAt:
          description: The date the pipeline was archived. `archivedAt` will only be present if the pipeline is archived.
          format: date-time
          type: string
        createdAt:
          description: The date the pipeline stage was created. The stages on default pipelines will have createdAt = 0.
          format: date-time
          type: string
        displayOrder:
          description: >-
            The order for displaying this pipeline stage. If two pipeline stages have a matching
            `displayOrder`, they will be sorted alphabetically by label.
          format: int32
