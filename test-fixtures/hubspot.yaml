            type: string
          style: simple
        - description: |2-
             End date to fetch asset metrics, formatted as YYYY-MM-DD. This date is used to fetch the metrics associated with the assets for a specified period.
            If not provided, no asset metrics will be fetched.
          explode: true
          in: query
          name: endDate
          required: false
          schema:
            type: string
          style: form
        - description: >-
            A comma-separated list of the properties to be returned in the response. If any of the specified
            properties has empty value on the requested object, they will be ignored and not returned in
            response. If this parameter is empty, the response will include an empty properties map.
          explode: true
