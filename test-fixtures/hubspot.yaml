    CrmListsListCreateRequest:
      description: The request object used when creating a new object list.
      example:
        filterBranch:
          filterBranchType: OR
          filterBranches:
            - filterBranchType: AND
              filterBranches:
                - associationCategory: HUBSPOT_DEFINED
                  associationTypeId: 4
                  filterBranchType: ASSOCIATION
                  filters:
                    - filterType: PROPERTY
                      operation:
                        operationType: BOOL
                        operator: IS_EQUAL_TO
                        value: true
                      property: hs_is_closed_won
                  objectTypeId: 0-3
                  operator: IN_LIST
              filters:
                - filterType: PROPERTY
                  operation:
                    operationType: MULTISTRING
                    operator: IS_EQUAL_TO
                    values:
                      - test
                      - name
                  property: firstname
        name: Dynamic Association List Example
        objectTypeId: 0-1
        processingType: DYNAMIC
      properties:
        customProperties:
          additionalProperties:
            type: string
          description: >-
            The list of custom properties to tie to the list. Custom property name is the key, the value is
            the value.
          type: object
        filterBranch:
          oneOf:
            - $ref: "#/components/schemas/PublicOrFilterBranch"
            - $ref: "#/components/schemas/PublicAndFilterBranch"
            - $ref: "#/components/schemas/PublicNotAllFilterBranch"
            - $ref: "#/components/schemas/PublicNotAnyFilterBranch"
            - $ref: "#/components/schemas/PublicRestrictedFilterBranch"
            - $ref: "#/components/schemas/PublicUnifiedEventsFilterBranch"
            - $ref: "#/components/schemas/PublicPropertyAssociationFilterBranch"
            - $ref: "#/components/schemas/PublicAssociationFilterBranch"
        listFolderId:
          description: >-
            The ID of the folder that the list should be created in. If left blank, then the list will be
            created in the root of the list folder structure.
          format: int32
          type: integer
        listPermissions:
          $ref: "#/components/schemas/CrmListsPublicListPermissions"
        membershipSettings:
          $ref: "#/components/schemas/CrmListsPublicMembershipSettings"
        name:
          description: The name of the list, which must be globally unique across all public lists in the portal.
          type: string
        objectTypeId:
          description: The object type ID of the type of objects that the list will store.
          type: string
        processingType:
          description: "The processing type of the list. One of: `SNAPSHOT`, `MANUAL`, or `DYNAMIC`."
          type: string
      required:
        - name
        - objectTypeId
        - processingType
      type: object
    CrmListsListCreateResponse:
      description: The response for a list create request.
      example:
        list:
          createdAt: "2023-11-15T18:16:52.165Z"
          createdById: "123"
          filterBranch:
            filterBranchOperator: OR
            filterBranchType: OR
            filterBranches:
              - filterBranchOperator: AND
                filterBranchType: AND
                filterBranches:
                  - associationCategory: HUBSPOT_DEFINED
                    associationTypeId: 4
                    filterBranchOperator: AND
                    filterBranchType: ASSOCIATION
                    filters:
                      - filterType: PROPERTY
                        operation:
                          includeObjectsWithNoValueSet: false
                          operationType: BOOL
                          operator: IS_EQUAL_TO
                          value: true
                        property: hs_is_closed_won
                    objectTypeId: 0-3
                    operator: IN_LIST
                filters:
                  - filterType: PROPERTY
                    operation:
                      includeObjectsWithNoValueSet: false
                      operationType: MULTISTRING
                      operator: IS_EQUAL_TO
                      values:
                        - test
                        - name
                    property: firstname
          filtersUpdatedAt: "2023-11-15T18:16:52.165Z"
          listId: "1"
          listVersion: 1
          name: Dynamic Association List Example
          objectTypeId: 0-1
          processingStatus: PROCESSING
          processingType: DYNAMIC
          updatedAt: "2023-11-15T18:16:52.395Z"
          updatedById: "123"
      properties:
        list:
          $ref: "#/components/schemas/CrmListsPublicObjectList"
      required:
        - list
      type: object
