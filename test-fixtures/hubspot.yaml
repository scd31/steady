              example:
                updatedList:
                  createdAt: "2023-11-15T18:16:52.165Z"
                  createdById: "123"
                  filtersUpdatedAt: "2023-11-15T19:03:24.160Z"
                  listId: "123"
                  listVersion: 2
                  name: Updated List Name
                  objectTypeId: 0-1
                  processingStatus: COMPLETE
                  processingType: DYNAMIC
                  updatedAt: "2023-11-15T19:03:32.979Z"
                  updatedById: "123"
              schema:
                $ref: "#/components/schemas/CrmListsListUpdateResponse"
          description: Successful response, for a request with `includeFilters` set to `false`.
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - cms.membership.access_groups.write
            - crm.lists.read
        - private_apps:
            - crm.lists.read
            - crm.lists.write
      summary: Update List Name
      tags:
        - Lists
