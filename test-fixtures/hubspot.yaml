  /cms/v3/hubdb/tables/{tableIdOrName}/draft/import:
    post:
      description: >-
        Import the contents of a CSV file into an existing HubDB table. The data will always be imported into
        the draft version of the table. Use the `/publish` endpoint to push these changes to the published
        version.

        This endpoint takes a multi-part POST request. The first part will be a set of JSON-formatted options
        for the import and you can specify this with the name as `config`.  The second part will be the CSV
        file you want to import and you can specify this with the name as `file`. Refer the [overview
        section](https://developers.hubspot.com/docs/api/cms/hubdb#importing-tables) to check the details and
        format of the JSON-formatted options for the import.
      operationId: post-/cms/v3/hubdb/tables/{tableIdOrName}/draft/import_importDraftTable
      parameters:
        - description: The ID of the destination table where data will be imported.
          explode: false
          in: path
          name: tableIdOrName
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                config:
                  type: string
                file:
                  format: binary
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsHubdbImportResult"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - hubdb
      summary: Import data into draft table
