            - crm.lists.read
        - private_apps:
            - crm.lists.read
            - crm.lists.write
      summary: Restore a List
      tags:
        - Lists
  /crm/v3/lists/{listId}/schedule-conversion:
    delete:
      description: Delete an existing scheduled conversion for a list.
      operationId: delete-/crm/v3/lists/{listId}/schedule-conversion
