        optionally any unique property value as specified by the `idProperty` query param.  Control what is
        returned via the `properties` query param.
      operationId: get-/crm/v3/objects/users/{userId}
      parameters:
        - description: Whether to return only results that have been archived.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: >-
            A comma separated list of object types to retrieve associated IDs for. If any of the specified
            associations do not exist, they will be ignored.
          explode: true
          in: query
          name: associations
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: The name of a property whose values are unique for this object
          explode: true
          in: query
          name: idProperty
          required: false
          schema:
            type: string
          style: form
        - description: >-
            A comma separated list of the properties to be returned in the response. If any of the specified
            properties are not present on the requested object(s), they will be ignored.
          explode: true
          in: query
          name: properties
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: >-
            A comma separated list of the properties to be returned along with their history of previous
            values. If any of the specified properties are not present on the requested object(s), they will
            be ignored.
          explode: true
          in: query
          name: propertiesWithHistory
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - explode: false
          in: path
          name: userId
          required: true
          schema:
            pattern: .+
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSimplePublicObjectWithAssociations"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - crm.objects.users.read
      summary: Read
      tags:
        - Basic
    patch:
      description: >-
        Perform a partial update of an Object identified by `{userId}`or optionally a unique property value as
        specified by the `idProperty` query param. `{userId}` refers to the internal object ID by default, and
        the `idProperty` query param refers to a property whose values are unique for the object. Provided
        property values will be overwritten. Read-only and non-existent properties will result in an error.
        Properties values can be cleared by passing an empty string.
      operationId: patch-/crm/v3/objects/users/{userId}
      parameters:
        - description: The name of a property whose values are unique for this object
          explode: true
          in: query
          name: idProperty
          required: false
          schema:
            type: string
          style: form
        - explode: false
          in: path
          name: userId
          required: true
          schema:
            pattern: .+
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmSimplePublicObjectInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSimplePublicObject"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - crm.objects.users.write
      summary: Update
      tags:
        - Basic
