    CrmTimelineTimelineEventTemplateUpdateRequest:
      description: State of the template definition being updated.
      example:
        detailTemplate: |-
          Registration occurred at {{#formatDate timestamp}}{{/formatDate}}

          #### Questions
          {{#each extraData.questions}}
            **{{question}}**: {{answer}}
          {{/each}}

          EDIT
        headerTemplate: Registered for [{{petName}}](https://my.petspot.com/pets/{{petName}})
        id: "1001298"
        name: PetSpot Registration
        tokens:
          - label: Pet Name
            name: petName
            objectPropertyName: firstname
            type: string
          - label: Pet Age
            name: petAge
            type: number
          - label: Pet Color
            name: petColor
            options:
              - label: White
                value: white
              - label: Black
                value: black
              - label: Brown
                value: brown
              - label: Yellow
                value: yellow
              - label: Other
                value: other
            type: enumeration
      properties:
        detailTemplate:
          description: >-
            This uses Markdown syntax with Handlebars and event-specific data to render HTML on a timeline
            when you expand the details.
          type: string
        headerTemplate:
          description: >-
            This uses Markdown syntax with Handlebars and event-specific data to render HTML on a timeline as
            a header.
          type: string
        id:
          description: The template ID.
          type: string
        name:
          description: The template name.
          type: string
        tokens:
