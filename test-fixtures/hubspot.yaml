  /marketing/v3/campaigns/:
    get:
      description: >-
        This endpoint allows users to search for and return a page of campaigns based on various query
        parameters. Users can filter by name, sort, and paginate through the campaigns, as well as control
        which properties are returned in the response.
      operationId: get-/marketing/v3/campaigns/
      parameters:
        - description: |-
            A cursor for pagination. If provided, the results will start after the given cursor.
            Example: NTI1Cg%3D%3D
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: |-
            The maximum number of results to return. Allowed values range from 1 to 100
            Default: 50
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: >-
            A filter to return campaigns whose names contain the specified substring. This allows partial
            matching of campaign names, returning all campaigns that include the given substring in their
            name. If this parameter is not provided, the search will return all campaigns
          explode: true
          in: query
          name: name
          required: false
          schema:
            type: string
          style: form
        - description: >-
            A comma-separated list of the properties to be returned in the response. If any of the specified
            properties has empty value on the requested object(s), they will be ignored and not returned in
            response. If this parameter is empty, the response will include an empty properties map
          explode: true
          in: query
          name: properties
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: >-
            The field by which to sort the results. Allowed values are hs_name, createdAt, updatedAt. An
            optional '-' before the property name can denote descending order

            Default: hs_name
          explode: true
          in: query
          name: sort
          required: false
          schema:
            type: string
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/MarketingCampaignsCollectionResponseWithTotalPublicCampaignForwardPaging
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - marketing.campaigns.read
      summary: Campaign search
      tags:
        - Basic
    post:
      description: >-
        Create a campaign with the given properties and return the campaign object, including the campaignGuid
        and created properties.
      operationId: post-/marketing/v3/campaigns/
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketingCampaignsPublicCampaignInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingCampaignsPublicCampaign"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - marketing.campaigns.write
      summary: Create a campaign
      tags:
        - Basic
  /marketing/v3/campaigns/batch/archive:
    post:
      description: >-
        This endpoint deletes a batch of campaigns.

        The maximum number of items in a batch request is 50.

        The response will always be 204 No Content, regardless of whether the campaigns exist or not, whether
        they were successfully deleted or not, or if only some of the campaigns in the batch were deleted.
      operationId: post-/marketing/v3/campaigns/batch/archive
