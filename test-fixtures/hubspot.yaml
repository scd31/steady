        definitions for the columns in the table and the number of rows in the table.


        **Note:** This endpoint can be accessed without any authentication if the table is set to be allowed
        for public access. To do so, you'll need to include the HubSpot account ID in a `portalId` query
        parameter.
      operationId: get-/cms/v3/hubdb/tables/{tableIdOrName}_getTableDetails
      parameters:
        - description: Set this to `true` to return details for an archived table. Defaults to `false`.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            type: boolean
          style: form
