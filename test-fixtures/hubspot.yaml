  /files/v3/files/search:
    get:
      description: Search through files in the file manager. Does not display hidden or archived files.
      operationId: get-/files/v3/files/search
      parameters:
        - description: >-
            Offset search results by this value. The default offset is 0 and the maximum offset of items for a
            given search is 10,000. Narrow your search down if you are reaching this limit.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: >-
            Search files by access. If `true`, will show only public files. If `false`, will show only private
            files.
          explode: true
          in: query
          name: allowsAnonymousAccess
          required: false
          schema:
            type: boolean
          style: form
        - explode: true
          in: query
          name: before
          required: false
          schema:
            type: string
          style: form
        - description: Search files by time of creation.
          explode: true
          in: query
          name: createdAt
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Search files by greater than or equal to time of creation. Can be used with `createdAtLte` to
            create a range.
          explode: true
          in: query
          name: createdAtGte
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Search files by less than or equal to time of creation. Can be used with `createdAtGte` to create
            a range.
          explode: true
          in: query
          name: createdAtLte
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Search files by specified encoding.
          explode: true
          in: query
          name: encoding
          required: false
          schema:
            type: string
          style: form
        - description: Search files by exact expires time. Time must be epoch time in milliseconds.
          explode: true
          in: query
          name: expiresAt
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Search files by greater than or equal to expires time. Can be used with `expiresAtLte` to create a
            range.
          explode: true
          in: query
          name: expiresAtGte
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Search files by less than or equal to expires time. Can be used with `expiresAtGte` to create a
            range.
          explode: true
          in: query
          name: expiresAtLte
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Search files by given extension.
          explode: true
          in: query
          name: extension
          required: false
          schema:
            type: string
          style: form
        - description: Search files by a specific md5 hash.
          explode: true
          in: query
          name: fileMd5
          required: false
          schema:
            type: string
          style: form
        - description: Search files by height of image or video.
          explode: true
          in: query
          name: height
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: >-
            Search files by greater than or equal to height of image or video. Can be used with `heightLte` to
            create a range.
          explode: true
          in: query
          name: heightGte
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: >-
            Search files by less than or equal to height of image or video. Can be used with `heightGte` to
            create a range.
          explode: true
          in: query
          name: heightLte
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - explode: true
          in: query
          name: idGte
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - explode: true
          in: query
          name: idLte
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: Search by a list of file IDs.
          explode: true
          in: query
          name: ids
          required: false
          schema:
            items:
              format: int64
              type: integer
            type: array
          style: form
        - description: >-
            If `true`, shows files that have been marked to be used in new content. If `false`, shows files
            that should not be used in new content.
          explode: true
          in: query
          name: isUsableInContent
          required: false
          schema:
            type: boolean
          style: form
        - description: Number of items to return. Default limit is 10, maximum limit is 100.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: Search for files containing the given name.
          explode: true
          in: query
          name: name
          required: false
          schema:
            type: string
          style: form
        - description: Search files within given `folderId`.
          explode: true
          in: query
          name: parentFolderIds
          required: false
          schema:
            items:
              format: int64
              type: integer
            type: array
          style: form
        - description: Search files by path.
          explode: true
          in: query
          name: path
          required: false
          schema:
            type: string
          style: form
        - description: A list of file properties to return.
          explode: true
          in: query
          name: properties
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: Search files by exact file size in bytes.
          explode: true
          in: query
          name: size
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: Search files by greater than or equal to file size. Can be used with `sizeLte` to create a range.
          explode: true
          in: query
          name: sizeGte
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: Search files by less than or equal to file size. Can be used with `sizeGte` to create a range.
          explode: true
          in: query
          name: sizeLte
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: Sort files by a given field.
          explode: true
          in: query
          name: sort
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: Filter by provided file type.
          explode: true
          in: query
          name: type
          required: false
          schema:
            type: string
          style: form
        - description: Search files by time of latest updated.
          explode: true
          in: query
          name: updatedAt
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Search files by greater than or equal to time of latest update. Can be used with `updatedAtLte` to
            create a range.
          explode: true
          in: query
          name: updatedAtGte
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Search files by less than or equal to time of latest update. Can be used with `updatedAtGte` to
            create a range.
          explode: true
          in: query
          name: updatedAtLte
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Search by file URL.
          explode: true
          in: query
          name: url
          required: false
          schema:
            type: string
          style: form
        - description: Search files by width of image or video.
          explode: true
          in: query
          name: width
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: >-
            Search files by greater than or equal to width of image or video. Can be used with `widthLte` to
            create a range.
          explode: true
          in: query
          name: widthGte
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: >-
            Search files by less than or equal to width of image or video. Can be used with `widthGte` to
            create a range.
          explode: true
          in: query
          name: widthLte
          required: false
          schema:
            format: int32
            type: integer
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesCollectionResponseFile"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - files.ui_hidden.read
        - private_apps:
            - files
      summary: Search files
      tags:
        - Files
