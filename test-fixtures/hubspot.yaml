  /crm/v3/lists/{listId}/memberships/add-from/{sourceListId}:
    put:
      description: >-
        Add all of the records from a *source list* (specified by the `sourceListId`) to a *destination list*
        (specified by the `listId`). Records that are already members of the *destination list* will be
        ignored. The *destination* and *source list* IDs must be different. The *destination* and *source
        lists* must contain records of the same type (e.g. contacts, companies, etc.).


        This endpoint only works for *destination lists* that have a `processingType` of `MANUAL` or
        `SNAPSHOT`. The *source list* can have any `processingType`.


        This endpoint only supports a `sourceListId` for lists with less than 100,000 memberships.
      operationId: put-/crm/v3/lists/{listId}/memberships/add-from/{sourceListId}_addAllFromList
      parameters:
        - description: >-
            The **ILS ID** of the `MANUAL` or `SNAPSHOT` *destination list*, which the *source list* records
            are added to.
          explode: false
          in: path
          name: listId
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            The **ILS ID** of the *source list* to grab the records from, which are then added to the
            *destination list*.
          explode: false
          in: path
          name: sourceListId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "204":
          content: {}
          description: Operation successful
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - cms.membership.access_groups.write
            - crm.lists.read
        - private_apps:
            - crm.lists.read
            - crm.lists.write
      summary: Add All Records from a Source List to a Destination List
      tags:
        - Memberships
  /crm/v3/lists/{listId}/memberships/join-order:
    get:
      description: >-
        Fetch the memberships of a list in order sorted by the time the records were added to the list.


        The `recordId`s are sorted in *ascending* order if an `after` offset or no offset is provided. If only
        a `before` offset is provided, then the records are sorted in *descending* order.


        The `after` offset parameter will take precedence over the `before` offset in a case where both are
        provided.
      operationId: get-/crm/v3/lists/{listId}/memberships/join-order_getPageOrderedByAddedToListDate
      parameters:
        - description: >-
            The paging offset token for the page that comes `after` the previously requested records.


            If provided, then the records in the response will be the records following the offset, sorted in
            *ascending* order. Takes precedence over the `before` offset.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: >-
            The paging offset token for the page that comes `before` the previously requested records.


            If provided, then the records in the response will be the records preceding the offset, sorted in
            *descending* order.
          explode: true
          in: query
          name: before
          required: false
          schema:
            type: string
          style: form
        - description: The number of records to return in the response. The maximum `limit` is 250.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            default: 100
            format: int32
            type: integer
          style: form
        - description: The **ILS ID** of the list.
          explode: false
          in: path
          name: listId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmListsApiCollectionResponseJoinTimeAndRecordId"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - crm.lists.read
      summary: Fetch List Memberships Ordered by Added to List Date
      tags:
        - List_App_Membership
  /crm/v3/lists/{listId}/memberships/remove:
    put:
      description: >-
        Remove the records provided from the list. Records that do not exist or that are not members of the
        list are ignored.


        This endpoint only works for lists that have a `processingType` of `MANUAL` or `SNAPSHOT`.
      operationId: put-/crm/v3/lists/{listId}/memberships/remove_remove
      parameters:
        - description: The **ILS ID** of the `MANUAL` or `SNAPSHOT` list.
          explode: false
          in: path
          name: listId
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: The IDs of the records to remove from the list.
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                recordIdsMissing:
                  - "789"
                recordIdsRemoved:
                  - "123"
                  - "456"
              schema:
                $ref: "#/components/schemas/CrmListsMembershipsUpdateResponse"
          description: Successful response
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - cms.membership.access_groups.write
            - crm.lists.read
        - private_apps:
            - crm.lists.read
            - crm.lists.write
      summary: Remove Records from a List
      tags:
        - Memberships
  /crm/v3/lists/{listId}/restore:
    put:
      description: >-
        Restore a previously deleted list by **ILS list ID**. Deleted lists are eligible to be restored up-to
        90-days after the list has been deleted.
      operationId: put-/crm/v3/lists/{listId}/restore_restore
      parameters:
