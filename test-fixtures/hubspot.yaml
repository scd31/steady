    get:
      description: >-
        Read an Object identified by `{objectId}`. `{objectId}` refers to the internal object ID by default,
        or optionally any unique property value as specified by the `idProperty` query param.  Control what is
        returned via the `properties` query param.
      operationId: get-/crm/v3/objects/{objectType}/{objectId}_getById
      parameters:
        - description: Whether to return only results that have been archived.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: >-
            A comma separated list of object types to retrieve associated IDs for. If any of the specified
            associations do not exist, they will be ignored.
          explode: true
          in: query
          name: associations
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: The name of a property whose values are unique for this object
          explode: true
          in: query
          name: idProperty
          required: false
          schema:
            type: string
          style: form
        - explode: false
          in: path
          name: objectId
          required: true
          schema:
            type: string
          style: simple
        - explode: false
          in: path
          name: objectType
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            A comma separated list of the properties to be returned in the response. If any of the specified
            properties are not present on the requested object(s), they will be ignored.
          explode: true
          in: query
          name: properties
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: >-
            A comma separated list of the properties to be returned along with their history of previous
            values. If any of the specified properties are not present on the requested object(s), they will
            be ignored.
          explode: true
          in: query
          name: propertiesWithHistory
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSimplePublicObjectWithAssociations"
