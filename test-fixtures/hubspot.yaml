          explode: true
          in: query
          name: archived
          required: false
          schema:
            type: boolean
          style: form
        - description: Set this to `true` to populate foreign ID values in the result.
          explode: true
          in: query
          name: includeForeignIds
          required: false
          schema:
            type: boolean
          style: form
        - description: Indicates whether to retrieve the localized schema for the table.
          explode: true
          in: query
          name: isGetLocalizedSchema
          required: false
          schema:
            type: boolean
          style: form
        - description: The ID or name of the table to return.
