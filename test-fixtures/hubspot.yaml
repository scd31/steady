          description: >-
            A label used to organize pipeline stages in HubSpot's UI. Each pipeline stage's label must be
            unique within that pipeline.
          type: string
        metadata:
          additionalProperties:
            type: string
          description: >-
            A JSON object containing properties that are not present on all object pipelines.


            For `deals` pipelines, the `probability` field is required (`{ "probability": 0.5 }`), and
            represents the likelihood a deal will close. Possible values are between 0.0 and 1.0 in increments
            of 0.1.


            For `tickets` pipelines, the `ticketState` field is optional (`{ "ticketState": "OPEN" }`), and
            represents whether the ticket remains open or has been closed by a member of your Support team.
            Possible values are `OPEN` or `CLOSED`.
