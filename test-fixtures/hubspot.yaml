openapi: 3.0.0
info:
  title: HubSpot API Specification
  version: 1.0.0
  description: Merged HubSpot API specifications from all endpoints
servers:
  - url: https://api.hubapi.com
paths:
  /account-info/v3/activity/audit-logs:
    get:
      description: >-
        Retrieve activity history for user actions related to approvals, content updates, CRM object updates,
        security activity, and more (Enterprise only). Learn more about [activities included in audit log
        exports](https://knowledge.hubspot.com/account-management/view-and-export-account-activity-history-in-a-centralized-audit-log?hubs_content=knowledge.hubspot.com/account-management/view-and-export-account-activity-history&hubs_content-cta=centralized%20audit%20log#data-included-in-the-centralized-audit-log).
      operationId: get-/account-info/v3/activity/audit-logs
      parameters:
        - description: The ID of a user, for retrieving user-specific logs.
          explode: true
          in: query
          name: actingUserId
          required: false
          schema:
            items:
              format: int32
              type: integer
            type: array
          style: form
        - description: >-
            The paging cursor token of the last successfully read resource will be returned as the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: The maximum number of results to display per page.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: "A timestamp, as a starting point for retrieving activity logs. "
          explode: true
          in: query
          name: occurredAfter
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: "A timestamp, as an end point for retrieving activity logs. "
          explode: true
          in: query
          name: occurredBefore
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Set to `occurredAt` to order results by the time of the event. By default, events are ordered from
            oldest to newest.
          explode: true
          in: query
          name: sort
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountActivityCollectionResponsePublicApiUserActionEventForwardPaging"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - account-info.security.read
      summary: Retrieve audit logs
      tags:
        - Activity
  /account-info/v3/activity/login:
    get:
      description: >-
        Retrieve logs of user actions related to [login
        activity](https://knowledge.hubspot.com/account-management/view-and-export-account-activity-history#account-login-history).
      operationId: get-/account-info/v3/activity/login
      parameters:
        - description: >-
            The cursor token value to get the next set of results. You can get this from the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: The maximum number of results to display per page. Max value of limit is 200.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: The ID of a user, for retrieving user-specific logs.
          explode: true
          in: query
          name: userId
          required: false
          schema:
            format: int32
            type: integer
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountActivityCollectionResponsePublicLoginAuditForwardPaging"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - account-info.security.read
      summary: Retrieve login activity
      tags:
        - Activity
  /account-info/v3/activity/security:
    get:
      description: >-
        Retrieve logs of user actions related to [security
        activity](https://knowledge.hubspot.com/account-management/view-and-export-account-activity-history#security-activity-history).
      operationId: get-/account-info/v3/activity/security
      parameters:
        - description: >-
            The cursor token value to get the next set of results. You can get this from the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: The start time, for retrieving logs within a specific timeframe.
          explode: true
          in: query
          name: fromTimestamp
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: The maximum number of results to display per page. Max value of limit is 200.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: The end time, for retrieving logs within a specific timeframe.
          explode: true
          in: query
          name: toTimestamp
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: The ID of a user, for retrieving user-specific logs.
          explode: true
          in: query
          name: userId
          required: false
          schema:
            format: int32
            type: integer
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountActivityCollectionResponseHydratedCriticalActionForwardPaging"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - account-info.security.read
      summary: Retrieve security history
      tags:
        - Activity
  /account-info/v3/api-usage/daily/private-apps:
    get:
      description: >-
        Retrieve the daily API usage for private apps in the account, along with information about usage
        limits.
      operationId: get-/account-info/v3/api-usage/daily/private-apps
      parameters: []
      responses:
        "200":
          content:
            application/json:
              example:
                results:
                  - collectedAt: "2020-04-10T06:46:40.789Z"
                    currentUsage: 1
                    fetchStatus: SUCCESS
                    name: private-apps-api-calls-daily
                    resetsAt: "2020-04-10T04:00:00Z"
                    usageLimit: 500000
              schema:
                $ref: "#/components/schemas/AccountCollectionResponseApiUsage"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - oauth
      summary: Retrieve private app daily API usage
      tags:
        - Usage
  /account-info/v3/details:
    get:
      description: "Retrieve account details such as the account type, time zone, currencies, and data hosting location. "
      operationId: get-/account-info/v3/details
      parameters: []
      responses:
        "200":
          content:
            application/json:
              example:
                additionalCurrencies:
                  - NZD
                  - AUD
                  - EUR
                companyCurrency: USD
                dataHostingLocation: eu1
                portalId: 12345678
                timeZone: US/Eastern
                uiDomain: app-eu1.hubspot.com
                utcOffset: "-04:00"
                utcOffsetMilliseconds: -14400000
              schema:
                $ref: "#/components/schemas/AccountPortalInformationResponse"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - oauth
      summary: Retrieve account details
      tags:
        - Details
  /appinstalls/v3/external-install:
    delete:
      description: >-
        Use this endpoint to uninstall your app from a customer's HubSpot account. If successful, this
        endpoint will return a 204 and the customer will receive an email notification that the developer has
        uninstall the app from their account.
      operationId: delete-/appinstalls/v3/external-install
      parameters: []
      responses:
        "204":
          content: {}
          description: No content
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - oauth
      summary: Uninstall app
      tags:
        - Install_External
  /automation/v4/actions/callbacks/complete:
    post:
      description: Complete a batch of blocked action executions.
      operationId: post-/automation/v4/actions/callbacks/complete_completeBatch
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationActionsBatchInputCallbackCompletionBatchRequest"
        required: true
      responses:
        "204":
          content: {}
          description: No content
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - automation
      summary: Complete a batch of callbacks
      tags:
        - Callbacks
  /automation/v4/actions/callbacks/{callbackId}/complete:
    post:
      description: Complete a specific blocked action execution by ID.
      operationId: post-/automation/v4/actions/callbacks/{callbackId}/complete_complete
      parameters:
        - description: The ID of the action execution.
          explode: false
          in: path
          name: callbackId
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationActionsCallbackCompletionRequest"
        required: true
      responses:
        "204":
          content: {}
          description: No content
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - automation
      summary: Completes a callback
      tags:
        - Callbacks
  /automation/v4/actions/{appId}:
    get:
      description: Retrieve custom workflow action definitions by app ID.
      operationId: get-/automation/v4/actions/{appId}_getPage
      parameters:
        - description: >-
            The paging cursor token of the last successfully read resource will be returned as the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: Whether to return only results that have been archived.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: The maximum number of results to display per page.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsCollectionResponsePublicActionDefinitionForwardPaging"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Retrieve custom action definitions
      tags:
        - Definitions
    post:
      description: Create a new custom workflow action.
      operationId: post-/automation/v4/actions/{appId}_create
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationActionsPublicActionDefinitionEgg"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionDefinition"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Create a new custom action definition
      tags:
        - Definitions
  /automation/v4/actions/{appId}/{definitionId}:
    delete:
      description: Delete an action definition by ID.
      operationId: delete-/automation/v4/actions/{appId}/{definitionId}_archive
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the custom action definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "204":
          content: {}
          description: No content
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Delete an action definition
      tags:
        - Definitions
    get:
      description: Retrieve a custom workflow action definition by ID.
      operationId: get-/automation/v4/actions/{appId}/{definitionId}_getById
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: Whether to return only results that have been archived.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: The ID of the custom action.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionDefinition"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Retrieve a custom action definition
      tags:
        - Definitions
    patch:
      description: Update an existing action definition by ID.
      operationId: patch-/automation/v4/actions/{appId}/{definitionId}_update
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the custom action definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationActionsPublicActionDefinitionPatch"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionDefinition"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Update an existing action definition
      tags:
        - Definitions
  /automation/v4/actions/{appId}/{definitionId}/functions:
    get:
      description: Retrieve all functions included in a definition.
      operationId: get-/automation/v4/actions/{appId}/{definitionId}/functions_getPage
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/AutomationActionsCollectionResponsePublicActionFunctionIdentifierNoPaging
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Retrieve functions for a given definition
      tags:
        - Functions
  /automation/v4/actions/{appId}/{definitionId}/functions/{functionType}:
    delete:
      description: Delete a function within a given definition.
      operationId: delete-/automation/v4/actions/{appId}/{definitionId}/functions/{functionType}_archiveByFunctionType
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            The type of function. Can be `PRE_ACTION_EXECUTION`, `PRE_FETCH_OPTIONS`, `POST_FETCH_OPTIONS`,
            `POST_ACTION_EXECUTION`.
          explode: false
          in: path
          name: functionType
          required: true
          schema:
            enum:
              - POST_ACTION_EXECUTION
              - POST_FETCH_OPTIONS
              - PRE_ACTION_EXECUTION
              - PRE_FETCH_OPTIONS
            type: string
          style: simple
      responses:
        "204":
          content: {}
          description: No content
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Delete a function for a definition
      tags:
        - Functions
    get:
      description: Retrieve functions of a specific type for a given definition.
      operationId: get-/automation/v4/actions/{appId}/{definitionId}/functions/{functionType}_getByFunctionType
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            The type of function. Can be `PRE_ACTION_EXECUTION`, `PRE_FETCH_OPTIONS`, `POST_FETCH_OPTIONS`,
            `POST_ACTION_EXECUTION`.
          explode: false
          in: path
          name: functionType
          required: true
          schema:
            enum:
              - POST_ACTION_EXECUTION
              - POST_FETCH_OPTIONS
              - PRE_ACTION_EXECUTION
              - PRE_FETCH_OPTIONS
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionFunction"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Retrieve functions by a type for a given definition
      tags:
        - Functions
    put:
      description: Add a function for a given definition.
      operationId: >-
        put-/automation/v4/actions/{appId}/{definitionId}/functions/{functionType}_createOrReplaceByFunctionType
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            The type of function. Can be `PRE_ACTION_EXECUTION`, `PRE_FETCH_OPTIONS`, `POST_FETCH_OPTIONS`,
            `POST_ACTION_EXECUTION`.
          explode: false
          in: path
          name: functionType
          required: true
          schema:
            enum:
              - POST_ACTION_EXECUTION
              - POST_FETCH_OPTIONS
              - PRE_ACTION_EXECUTION
              - PRE_FETCH_OPTIONS
            type: string
          style: simple
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionFunctionIdentifier"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Insert a function for a definition
      tags:
        - Functions
  /automation/v4/actions/{appId}/{definitionId}/functions/{functionType}/{functionId}:
    delete:
      description: Archive a function for a specific definition.
      operationId: delete-/automation/v4/actions/{appId}/{definitionId}/functions/{functionType}/{functionId}_archive
      parameters:
        - explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
        - explode: false
          in: path
          name: functionId
          required: true
          schema:
            type: string
          style: simple
        - explode: false
          in: path
          name: functionType
          required: true
          schema:
            enum:
              - POST_ACTION_EXECUTION
              - POST_FETCH_OPTIONS
              - PRE_ACTION_EXECUTION
              - PRE_FETCH_OPTIONS
            type: string
          style: simple
      responses:
        "204":
          content: {}
          description: No content
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Archive a function for a definition
      tags:
        - Functions
    get:
      description: Retrieve a specific function from a given definition.
      operationId: get-/automation/v4/actions/{appId}/{definitionId}/functions/{functionType}/{functionId}_getById
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
        - description: The ID of the function.
          explode: false
          in: path
          name: functionId
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            The type of function. Can be `PRE_ACTION_EXECUTION`, `PRE_FETCH_OPTIONS`, `POST_FETCH_OPTIONS`,
            `POST_ACTION_EXECUTION`.
          explode: false
          in: path
          name: functionType
          required: true
          schema:
            enum:
              - POST_ACTION_EXECUTION
              - POST_FETCH_OPTIONS
              - PRE_ACTION_EXECUTION
              - PRE_FETCH_OPTIONS
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionFunction"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Retrieve a function from a given definition
      tags:
        - Functions
    put:
      description: Update a function for a given definition by ID.
      operationId: >-
        put-/automation/v4/actions/{appId}/{definitionId}/functions/{functionType}/{functionId}_createOrReplace
      parameters:
        - description: The ID of the app.
          explode: false
          in: path
          name: appId
          required: true
          schema:
            format: int32
            type: integer
          style: simple
        - description: The ID of the definition.
          explode: false
          in: path
          name: definitionId
          required: true
          schema:
            type: string
          style: simple
        - description: The ID of the function.
          explode: false
          in: path
          name: functionId
          required: true
          schema:
            type: string
          style: simple
        - description: >-
            The type of function. Can be `PRE_ACTION_EXECUTION`, `PRE_FETCH_OPTIONS`, `POST_FETCH_OPTIONS`,
            `POST_ACTION_EXECUTION`.
          explode: false
          in: path
          name: functionType
          required: true
          schema:
            enum:
              - POST_ACTION_EXECUTION
              - POST_FETCH_OPTIONS
              - PRE_ACTION_EXECUTION
              - PRE_FETCH_OPTIONS
            type: string
          style: simple
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationActionsPublicActionFunctionIdentifier"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - developer_hapikey: []
      summary: Update a function for a definition
      tags:
        - Functions
  /automation/v4/actions/{appId}/{definitionId}/revisions:
    get:
      description: Retrieve the versions of a definition by ID.
      operationId: get-/automation/v4/actions/{appId}/{definitionId}/revisions_getPage
      parameters:
        - description: >-
            The paging cursor token of the last successfully read resource will be returned as the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
