    get:
      description: Read a page of projects. Control what is returned via the `properties` query param.
      operationId: get-/crm/objects/v3/projects
      parameters:
        - description: >-
            The paging cursor token of the last successfully read resource will be returned as the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: Whether to return only results that have been archived.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            default: false
            type: boolean
          style: form
        - description: >-
            A comma separated list of object types to retrieve associated IDs for. If any of the specified
            associations do not exist, they will be ignored.
          explode: true
          in: query
          name: associations
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: >-
            The paging cursor token of the last successfully read resource will be returned as the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            default: 10
            format: int32
            type: integer
          style: form
        - description: >-
            A comma separated list of the properties to be returned in the response. If any of the specified
            properties are not present on the requested object(s), they will be ignored.
          explode: true
          in: query
          name: properties
          required: false
          schema:
            items:
