  /oauth/v1/token:
    post:
      description: >-
        Use a [previously obtained refresh token](#get-oauth-2.0-access-and-refresh-tokens) to generate a new
        access token.


        Access tokens are short lived. You can check the `expires_in` parameter when generating an access
        token to determine its lifetime (in seconds). If you need offline access to HubSpot data, store the
        refresh token you get when [initiating your OAuth
        integration](https://developers.hubspot.com/docs/guides/api/app-management/oauth-tokens#initiating-oauth-access)
        and use it to generate a new access token once the initial one expires.


        Note: HubSpot access tokens will fluctuate in size as the information that's encoded in them changes
        over time. It's recommended to allow for tokens to be up to 300 characters to account for any
        potential changes.
      operationId: post-/oauth/v1/token_create
      parameters:
        - explode: true
          in: query
          name: client_secret
          required: false
          schema:
            type: string
          style: form
        - explode: true
          in: query
          name: refresh_token
          required: false
          schema:
            type: string
          style: form
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties:
                client_id:
                  type: string
                client_secret:
                  type: string
                code:
                  type: string
                code_verifier:
                  type: string
                grant_type:
                  enum:
                    - authorization_code
                    - client_credentials
                    - refresh_token
                  type: string
                redirect_uri:
                  type: string
                refresh_token:
                  type: string
                scope:
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOauthTokenResponseIF"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security: []
      summary: Refresh an access token
      tags:
        - Tokens
