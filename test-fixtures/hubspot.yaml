  /marketing/v3/emails/:
    get:
      description: >-
        The results can be filtered, allowing you to find a specific set of emails. See the table below for a
        full list of filtering options.
      operationId: get-/marketing/v3/emails/_getPage
      parameters:
        - description: >-
            The cursor token value to get the next set of results. You can get this from the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: Specifies whether to return archived emails. Defaults to `false`.
          explode: true
          in: query
          name: archived
          required: false
          schema:
            type: boolean
          style: form
        - description: Filter by campaign GUID. All emails will be returned if not present.
          explode: true
          in: query
          name: campaign
          required: false
          schema:
            type: string
          style: form
        - description: Only return emails created after the specified time.
          explode: true
          in: query
          name: createdAfter
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Only return emails created at exactly the specified time.
          explode: true
          in: query
          name: createdAt
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Only return emails created before the specified time.
          explode: true
          in: query
          name: createdBefore
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Limit the response to only include this specified list of properties.
          explode: true
          in: query
          name: includedProperties
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: Include statistics with emails.
          explode: true
          in: query
          name: includeStats
          required: false
          schema:
            type: boolean
          style: form
        - description: Filter by published/draft emails. All emails will be returned if not present.
          explode: true
          in: query
          name: isPublished
          required: false
          schema:
            type: boolean
          style: form
        - description: The maximum number of results to return. Default is 10.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: Include the names for any associated marketing campaigns.
          explode: true
          in: query
          name: marketingCampaignNames
          required: false
          schema:
            type: boolean
          style: form
        - explode: true
          in: query
          name: publishedAfter
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - explode: true
          in: query
          name: publishedAt
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - explode: true
          in: query
          name: publishedBefore
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Specifies which fields to use for sorting results. Valid fields are `name`, `createdAt`,
            `updatedAt`, `createdBy`, `updatedBy`. `createdAt` will be used by default.
          explode: true
          in: query
          name: sort
          required: false
          schema:
            items:
              type: string
