  /events/v3/events/:
    get:
      description: >-
        Retrieve instances of event completion data. For example, retrieve all event completions associated
        with a specific contact.
      operationId: get-/events/v3/events/_getPage
      parameters:
        - description: >-
            The paging cursor token of the last successfully read resource will be returned as the
            `paging.next.after` JSON property of a paged response containing more results.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - explode: true
          in: query
          name: before
          required: false
          schema:
            type: string
          style: form
        - description: >-
            The event type name. You can retrieve available event types using the [event types
            endpoint](#get-%2Fevents%2Fv3%2Fevents%2Fevent-types).
          explode: true
          in: query
          name: eventType
          required: false
          schema:
            type: string
          style: form
        - description: >-
            ID of an event instance. IDs are 1:1 with event instances. If you provide this filter and
            additional filters, the other filters must match the values on the event instance to yield
            results.
          explode: true
          in: query
          name: id
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: The maximum number of results to display per page.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            format: int32
            type: integer
          style: form
        - description: >-
            The ID of the CRM Object to filter event instances on. When including this parameter, you must
            also include the `objectType` parameter.
          explode: true
          in: query
          name: objectId
          required: false
          schema:
            format: int64
            type: integer
          style: form
        - description: >-
            Instead of retrieving event data for a specific object by its ID, you can specify a unique
            identifier property. For contacts, you can use the `email` property. (e.g.,
            `objectProperty.email=name@domain.com`).
          explode: true
          in: query
          name: objectProperty.{propname}
          required: false
          schema:
            type: object
          style: form
        - description: >-
            The type of CRM object to filter event instances on (e.g., `contact`). To retrieve event data for
            a specific CRM record, include the additional `objectId` query parameter (below).
          explode: true
          in: query
          name: objectType
          required: false
          schema:
            type: string
          style: form
        - description: Filter for event data that occurred after a specific datetime.
          explode: true
          in: query
          name: occurredAfter
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: Filter for event data that occurred before a specific datetime.
          explode: true
          in: query
          name: occurredBefore
          required: false
          schema:
            format: date-time
            type: string
          style: form
        - description: >-
            Filter for event completions that contain a specific value for an event property (e.g.,
            `property.hs_city=portland`). For properties values with spaces, replaces spaces with `%20` or `+`
            (e.g., `property.hs_city=new+york`).
          explode: true
          in: query
          name: property.{propname}
          required: false
          schema:
            type: object
          style: form
        - description: Sort direction based on the timestamp of the event instance, `ASCENDING` or `DESCENDING`.
          explode: true
          in: query
          name: sort
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsCollectionResponseExternalUnifiedEvent"
          description: successful operation
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - oauth
      summary: Retrieve event data
      tags:
        - Events
