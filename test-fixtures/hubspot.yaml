        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingCampaignsBatchResponsePublicCampaign"
          description: successful operation
        "207":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingCampaignsBatchResponsePublicCampaignWithErrors"
          description: multiple statuses
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - marketing.campaigns.write
      summary: Create a batch of campaigns
      tags:
        - Batch
  /marketing/v3/campaigns/batch/read:
    post:
      description: >
        This endpoint reads a batch of campaigns based on the provided input data and returns the campaigns
        along with their associated assets.

        The maximum number of items in a batch request is 50.

        The campaigns in the response are not guaranteed to be in the same order as they were provided in the
        request.

        If duplicate campaign IDs are provided in the request, duplicates will be ignored. The response will
        include only unique IDs and will be returned without duplicates.
      operationId: post-/marketing/v3/campaigns/batch/read
      parameters:
        - description: >-
            End date to fetch asset metrics, formatted as YYYY-MM-DD. This date is used to fetch the metrics
            associated with the assets for a specified period. If not provided, no asset metrics will be
            fetched.
          explode: true
          in: query
          name: endDate
          required: false
          schema:
            type: string
          style: form
        - description: >-
            A comma-separated list of the properties to be returned in the response. If any of the specified
            properties has empty value on the requested object(s), they will be ignored and not returned in
            response. If this parameter is empty, the response will include an empty properties map.
          explode: true
          in: query
          name: properties
          required: false
          schema:
            items:
              type: string
            type: array
          style: form
        - description: >
            Start date to fetch asset metrics, formatted as YYYY-MM-DD. This date is used to fetch the metrics
            associated with the assets for a specified period. If not provided, no asset metrics will be
            fetched.
          explode: true
          in: query
          name: startDate
          required: false
          schema:
            type: string
          style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketingCampaignsBatchInputPublicCampaignReadInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingCampaignsBatchResponsePublicCampaignWithAssets"
          description: successful operation
        "207":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingCampaignsBatchResponsePublicCampaignWithAssetsWithErrors"
          description: multiple statuses
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - marketing.campaigns.read
      summary: Read a batch of campaigns
      tags:
        - Batch
  /marketing/v3/campaigns/batch/update:
    post:
      description: >-
        This endpoint updates a batch of campaigns based on the provided input data.

        The maximum number of items in a batch request is 50.

        If an empty string ("") is passed for any property in the Batch Update, it will reset that property's
