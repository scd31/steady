  /crm/v3/lists/{listId}/memberships:
    delete:
      description: |-
        Remove **all** of the records from a list. ***Note:*** *The list is not deleted.*

        This endpoint only works for lists that have a `processingType` of `MANUAL` or `SNAPSHOT`.

        This endpoint only supports lists that have less than 100,000 memberships.
      operationId: delete-/crm/v3/lists/{listId}/memberships_removeAll
      parameters:
        - description: The **ILS ID** of the `MANUAL` or `SNAPSHOT` list.
          explode: false
          in: path
          name: listId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "204":
          content: {}
          description: Operation successful
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - cms.membership.access_groups.write
            - crm.lists.read
        - private_apps:
            - crm.lists.read
            - crm.lists.write
      summary: Delete All Records from a List
      tags:
        - Memberships
    get:
      description: >-
        Fetch the memberships of a list in order sorted by the `recordId` of the records in the list.


        The `recordId`s are sorted in *ascending* order if an `after` offset or no offset is provided. If only
        a `before` offset is provided, then the records are sorted in *descending* order.


        The `after` offset parameter will take precedence over the `before` offset in a case where both are
        provided.
      operationId: get-/crm/v3/lists/{listId}/memberships_getPage
      parameters:
        - description: >-
            The paging offset token for the page that comes `after` the previously requested records.


            If provided, then the records in the response will be the records following the offset, sorted in
            *ascending* order. Takes precedence over the `before` offset.
          explode: true
          in: query
          name: after
          required: false
          schema:
            type: string
          style: form
        - description: >-
            The paging offset token for the page that comes `before` the previously requested records.


            If provided, then the records in the response will be the records preceding the offset, sorted in
            *descending* order.
          explode: true
          in: query
          name: before
          required: false
          schema:
            type: string
          style: form
        - description: The number of records to return in the response. The maximum `limit` is 250.
          explode: true
          in: query
          name: limit
          required: false
          schema:
            default: 100
            format: int32
            type: integer
          style: form
        - description: The **ILS ID** of the list.
          explode: false
          in: path
          name: listId
          required: true
          schema:
            type: string
          style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                paging:
                  next:
                    after: AAAAAAAAAS0%3D
                    link: >-
                      https://private.hubapi.com/crm/v3/lists/123/memberships?portalId=865747473&limit=2&after=AAAAAAAAAS0%3D
                  prev:
                    before: AAAAAAAAAMk%3D
                    link: >-
                      https://private.hubapi.com/crm/v3/lists/123/memberships?before=AAAAAAAAAMk%3D&portalId=865747473&limit=2
                results:
                  - membershipTimestamp: "2023-11-07T16:46:04.122Z"
                    recordId: "202"
                  - membershipTimestamp: "2023-11-07T16:46:04.122Z"
                    recordId: "232"
                  - membershipTimestamp: "2023-11-07T16:46:04.122Z"
                    recordId: "239"
                total: 330
              schema:
                $ref: "#/components/schemas/CrmListsApiCollectionResponseJoinTimeAndRecordId"
          description: Successful response
        default:
          $ref: "#/components/responses/Error"
          description: ""
      security:
        - private_apps:
            - crm.lists.read
      summary: Fetch List Memberships Ordered by ID
      tags:
        - Memberships
