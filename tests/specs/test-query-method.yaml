openapi: 3.1.0
info:
  title: Test API for HTTP QUERY method
  version: 1.0.0
servers:
  - url: http://localhost:3001

paths:
  /search:
    query:
      summary: Search with structured query body
      operationId: search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - q
              properties:
                q:
                  type: string
                  minLength: 1
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                  total:
                    type: integer
